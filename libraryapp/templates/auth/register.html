<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Thư viện OU</title>
    <link rel="icon" href="https://res.cloudinary.com/dmhnfoc9i/image/upload/v1774794944/book_x3tz99.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { background-color: #f4f7f6; display: flex; flex-direction: column; min-height: 100vh; margin: 0; }
        .main-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 20px 0; }
        .register-box { width: 100%; max-width: 600px; }
    </style>
</head>
<body>

{% include 'layout/header.html' %}

<div class="main-container">
    <div class="register-box">
        <div class="card card-modern p-4">
            <div class="text-center mb-4">
                <img src="https://res.cloudinary.com/dmhnfoc9i/image/upload/v1774794944/book_x3tz99.png" alt="Logo Thư Viện" width="60" class="mb-3">
                <h4 class="fw-bold text-primary">ĐĂNG KÝ TÀI KHOẢN</h4>
                <p class="text-muted mb-0">Tham gia hệ thống mượn trả sách thư viện</p>
            </div>

            {% if err_msg %}
            <div class="alert alert-danger text-center fw-bold" role="alert">
                <i class="fa-solid fa-circle-xmark"></i> {{ err_msg }}
            </div>
            {% endif %}

            <form action="/register" method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold text-secondary">Họ và Tên</label>
                        <input type="text" name="name" class="form-control" placeholder="......" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold text-secondary">Số điện thoại</label>
                        <input type="text" name="phone" class="form-control" placeholder="....." required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold text-secondary">Tên đăng nhập</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="fa-solid fa-id-card text-primary"></i></span>
                            <input type="text" name="username" class="form-control" placeholder="Username..." required>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold text-secondary">Email</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="fa-solid fa-envelope text-primary"></i></span>
                            <input type="email" name="email" class="form-control" placeholder="VD: sv@ou.edu.vn" required>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold text-secondary">Mật khẩu</label>
                        <input type="password" name="password" class="form-control" placeholder="Tạo mật khẩu..." required>
                    </div>
                    <div class="col-md-6 mb-4">
                        <label class="form-label fw-bold text-secondary">Xác nhận mật khẩu</label>
                        <input type="password" name="confirm" class="form-control" placeholder="Nhập lại mật khẩu..." required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" style="border-radius: 8px;">
                    HOÀN TẤT ĐĂNG KÝ
                </button>
            </form>

            <div class="text-center mt-3">
                <span class="text-muted">Đã có tài khoản?</span>
                <a href="/login" class="text-primary fw-bold text-decoration-none">Đăng nhập ngay</a>
            </div>
        </div>
    </div>
</div>

{% include 'layout/footer.html' %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
